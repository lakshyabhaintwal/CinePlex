<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showtimes — Cineplex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:    #111110;
            --bg2:   #1a1a18;
            --rule:  rgba(255,255,255,0.07);
            --text:  #eeece8;
            --muted: #7a7770;
            --dim:   #3a3835;
            --amber: #c8964a;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Geist', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--rule);
            background: rgba(17,17,16,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            font-style: italic;
            color: var(--text);
            letter-spacing: -0.01em;
            text-decoration: none;
        }

        .nav-logo span { color: var(--amber); }

        .nav-links { display: flex; align-items: center; gap: 8px; }

        .nav-links a {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.10em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 2px;
            transition: color 0.2s, background 0.2s;
        }

        .nav-links a:hover { color: var(--text); background: var(--bg2); }

        .page {
            max-width: 640px;
            margin: 0 auto;
            padding: 104px 40px 80px;
            animation: up 0.6s ease both;
        }

        .overline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 16px;
        }

        .overline-rule {
            width: 20px;
            height: 1px;
            background: var(--amber);
            opacity: 0.5;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            font-weight: 700;
            line-height: 1.08;
            color: var(--text);
            margin-bottom: 56px;
            letter-spacing: -0.02em;
        }

        h1 em {
            font-style: italic;
            font-weight: 400;
            color: var(--muted);
        }

        .list { border-top: 1px solid var(--rule); }

        .show-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: 32px;
            padding: 24px 0;
            border-bottom: 1px solid var(--rule);
        }

        .show-time {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .show-price {
            font-size: 13px;
            font-weight: 300;
            color: var(--amber);
            white-space: nowrap;
        }

        .btn-fill {
            display: inline-block;
            background: var(--amber);
            color: var(--bg);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            padding: 11px 22px;
            border-radius: 2px;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn-fill:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-fill:active { transform: translateY(0); }

        @keyframes up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 560px) {
            nav { padding: 0 20px; }
            .page { padding: 88px 20px 60px; }
            h1 { font-size: 32px; margin-bottom: 40px; }
            .show-row { grid-template-columns: 1fr auto; gap: 16px; }
            .show-price { display: none; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">Cine<span>plex</span></a>
    <div class="nav-links">
        <a href="/movies/">Films</a>
        <a href="/my-reservations/">Tickets</a>
    </div>
</nav>

<div class="page">

    <div class="overline"><span class="overline-rule"></span> Select a time</div>
    <h1>Choose your <em>showtime.</em></h1>

    <div class="list">
        {% for show in showtimes %}
        <div class="show-row">
            <div class="show-time">{{ show.showtime }}</div>
            <div class="show-price">₹{{ show.price }}</div>
            <a href="/seats/{{ show.id }}/" class="btn-fill">Select seats</a>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
