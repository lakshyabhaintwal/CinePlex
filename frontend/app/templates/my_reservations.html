<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reservations — Cineplex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:    #111110;
            --bg2:   #1a1a18;
            --rule:  rgba(255,255,255,0.07);
            --text:  #eeece8;
            --muted: #7a7770;
            --dim:   #3a3835;
            --amber: #c8964a;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Geist', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--rule);
            background: rgba(17,17,16,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            font-style: italic;
            color: var(--text);
            letter-spacing: -0.01em;
            text-decoration: none;
        }

        .nav-logo span { color: var(--amber); }

        .nav-links { display: flex; align-items: center; gap: 8px; }

        .nav-links a {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.10em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 2px;
            transition: color 0.2s, background 0.2s;
        }

        .nav-links a:hover { color: var(--text); background: var(--bg2); }
        .nav-links a.active { color: var(--text); }

        .page {
            max-width: 680px;
            margin: 0 auto;
            padding: 104px 40px 80px;
            animation: up 0.6s ease both;
        }

        .overline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 16px;
        }

        .overline-rule {
            width: 20px;
            height: 1px;
            background: var(--amber);
            opacity: 0.5;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            font-weight: 700;
            line-height: 1.08;
            color: var(--text);
            margin-bottom: 56px;
            letter-spacing: -0.02em;
        }

        h1 em {
            font-style: italic;
            font-weight: 400;
            color: var(--muted);
        }

        .empty {
            padding: 56px 0;
            border-top: 1px solid var(--rule);
            border-bottom: 1px solid var(--rule);
            text-align: center;
        }

        .empty-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 400;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .empty-sub {
            font-size: 13px;
            font-weight: 300;
            color: var(--dim);
            margin-bottom: 32px;
        }

        .btn-fill {
            display: inline-block;
            background: var(--amber);
            color: var(--bg);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            padding: 13px 26px;
            border-radius: 2px;
            transition: opacity 0.2s, transform 0.15s;
            border: none;
            cursor: pointer;
            font-family: 'Geist', sans-serif;
        }

        .btn-fill:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-fill:active { transform: translateY(0); }

        .list { border-top: 1px solid var(--rule); }

        .reservation {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 24px;
            padding: 28px 0;
            border-bottom: 1px solid var(--rule);
            animation: up 0.5s ease both;
        }

        .res-movie {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 10px;
            letter-spacing: -0.01em;
        }

        .res-meta {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .meta-label {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 3px;
        }

        .meta-value {
            font-size: 13px;
            font-weight: 300;
            color: var(--muted);
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--dim);
            border-radius: 2px;
            padding: 10px 18px;
            font-size: 10px;
            font-family: 'Geist', sans-serif;
            font-weight: 500;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: var(--muted);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-cancel:hover {
            border-color: rgba(192,57,43,0.4);
            color: #e07060;
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 560px) {
            nav { padding: 0 20px; }
            .page { padding: 88px 20px 60px; }
            .reservation { grid-template-columns: 1fr; gap: 16px; }
            h1 { font-size: 32px; margin-bottom: 40px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">Cine<span>plex</span></a>
    <div class="nav-links">
        <a href="/movies/">Films</a>
        <a href="/my-reservations/" class="active">Tickets</a>
    </div>
</nav>

<div class="page">

    <div class="overline"><span class="overline-rule"></span> Your bookings</div>
    <h1>My <em>reservations.</em></h1>

    {% if reservations %}
    <div class="list">
        {% for r in reservations %}
        <div class="reservation">
            <div>
                <div class="res-movie">{{ r.movie }}</div>
                <div class="res-meta">
                    <div>
                        <div class="meta-label">Showtime</div>
                        <div class="meta-value">{{ r.showtime }}</div>
                    </div>
                    <div>
                        <div class="meta-label">Seats</div>
                        <div class="meta-value">{{ r.seats }}</div>
                    </div>
                </div>
            </div>
            <form method="POST" action="/cancel-reservation/">
                {% csrf_token %}
                <input type="hidden" name="reservation_id" value="{{ r.id }}">
                <button type="submit" class="btn-cancel">Cancel</button>
            </form>
        </div>
        {% endfor %}
    </div>

    {% else %}
    <div class="empty">
        <p class="empty-title">No reservations yet.</p>
        <p class="empty-sub">Pick a film and grab your seat.</p>
        <a href="/movies/" class="btn-fill">Browse films</a>
    </div>
    {% endif %}

</div>

</body>
</html>
