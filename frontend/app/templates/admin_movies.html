<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Cineplex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:    #111110;
            --bg2:   #1a1a18;
            --rule:  rgba(255,255,255,0.07);
            --text:  #eeece8;
            --muted: #7a7770;
            --dim:   #3a3835;
            --amber: #c8964a;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Geist', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--rule);
            background: rgba(17,17,16,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            font-style: italic;
            color: var(--text);
            letter-spacing: -0.01em;
            text-decoration: none;
        }

        .nav-logo span { color: var(--amber); }

        .nav-badge {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--amber);
            border: 1px solid rgba(200,150,74,0.3);
            border-radius: 2px;
            padding: 4px 10px;
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
            padding: 104px 40px 80px;
            animation: up 0.6s ease both;
        }

        .overline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 16px;
        }

        .overline-rule {
            width: 20px;
            height: 1px;
            background: var(--amber);
            opacity: 0.5;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            font-weight: 700;
            line-height: 1.08;
            color: var(--text);
            margin-bottom: 40px;
            letter-spacing: -0.02em;
        }

        h1 em {
            font-style: italic;
            font-weight: 400;
            color: var(--muted);
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .count {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        .btn-add {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--amber);
            color: var(--bg);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 2px;
            transition: opacity 0.2s, transform 0.15s;
        }

        .btn-add:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-add:active { transform: translateY(0); }

        .list { border-top: 1px solid var(--rule); margin-top: 24px; }

        .movie-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 20px 0;
            border-bottom: 1px solid var(--rule);
        }

        .movie-info { min-width: 0; }

        .movie-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 400;
            color: var(--text);
            letter-spacing: -0.01em;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-genre {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: var(--amber);
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn-action {
            display: inline-block;
            text-decoration: none;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            padding: 8px 14px;
            border-radius: 2px;
            border: 1px solid var(--dim);
            color: var(--muted);
            background: transparent;
            cursor: pointer;
            font-family: 'Geist', sans-serif;
            transition: border-color 0.2s, color 0.2s;
            white-space: nowrap;
        }

        .btn-action:hover { border-color: var(--muted); color: var(--text); }

        .btn-action.danger:hover {
            border-color: rgba(192,57,43,0.4);
            color: #e07060;
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 560px) {
            nav { padding: 0 20px; }
            .page { padding: 88px 20px 60px; }
            h1 { font-size: 32px; }
            .movie-row { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">Cine<span>plex</span></a>
    <span class="nav-badge">Admin</span>
</nav>

<div class="page">

    <div class="overline"><span class="overline-rule"></span> Dashboard</div>
    <h1>Admin <em>panel.</em></h1>

    <div class="toolbar">
        <span class="count">{{ movies|length }} film{{ movies|length|pluralize }} listed</span>
        <a href="/dashboard/add-movie/" class="btn-add">+ Add film</a>
    </div>

    <div class="list">
        {% for movie in movies %}
        <div class="movie-row">
            <div class="movie-info">
                <div class="movie-title">{{ movie.title }}</div>
                <div class="movie-genre">{{ movie.genre }}</div>
            </div>
            <div class="actions">
                <a href="/dashboard/movies/{{ movie.id }}/add-showtime/" class="btn-action">+ Showtime</a>
                <a href="/dashboard/movies/{{ movie.id }}/edit/" class="btn-action">Edit</a>
                <a href="/dashboard/movies/{{ movie.id }}/delete/" class="btn-action danger">Delete</a>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
