<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats — Cineplex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:    #111110;
            --bg2:   #1a1a18;
            --rule:  rgba(255,255,255,0.07);
            --text:  #eeece8;
            --muted: #7a7770;
            --dim:   #3a3835;
            --amber: #c8964a;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Geist', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-bottom: 1px solid var(--rule);
            background: rgba(17,17,16,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            font-style: italic;
            color: var(--text);
            letter-spacing: -0.01em;
            text-decoration: none;
        }

        .nav-logo span { color: var(--amber); }

        .nav-links { display: flex; align-items: center; gap: 8px; }

        .nav-links a {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.10em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 2px;
            transition: color 0.2s, background 0.2s;
        }

        .nav-links a:hover { color: var(--text); background: var(--bg2); }

        .page {
            max-width: 560px;
            margin: 0 auto;
            padding: 104px 40px 80px;
            animation: up 0.6s ease both;
        }

        .overline {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 16px;
        }

        .overline-rule {
            width: 20px;
            height: 1px;
            background: var(--amber);
            opacity: 0.5;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 40px;
            font-weight: 700;
            line-height: 1.08;
            color: var(--text);
            margin-bottom: 48px;
            letter-spacing: -0.02em;
        }

        h1 em {
            font-style: italic;
            font-weight: 400;
            color: var(--muted);
        }

        .screen {
            width: 100%;
            text-align: center;
            padding-bottom: 20px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--rule);
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--amber);
        }

        .seat-grid { margin-bottom: 40px; }

        .seat-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .row-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--dim);
            letter-spacing: 0.08em;
            width: 16px;
            flex-shrink: 0;
            text-align: center;
        }

        .seats { display: flex; gap: 8px; }

        .seat {
            width: 44px;
            height: 44px;
            border-radius: 2px;
            font-size: 11px;
            font-weight: 500;
            font-family: 'Geist', sans-serif;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.15s, color 0.15s, transform 0.15s;
        }

        .seat-available {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--muted);
            cursor: pointer;
        }

        .seat-available:hover {
            border-color: var(--amber);
            color: var(--amber);
            transform: translateY(-1px);
        }

        .seat-available:active { transform: translateY(0); }

        .seat-booked {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--dim);
            cursor: not-allowed;
            opacity: 0.35;
        }

        .legend {
            display: flex;
            gap: 24px;
            padding-top: 28px;
            border-top: 1px solid var(--rule);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        .legend-swatch {
            width: 16px;
            height: 16px;
            border-radius: 2px;
        }

        .swatch-available { border: 1px solid var(--dim); }

        .swatch-booked {
            border: 1px solid var(--dim);
            opacity: 0.35;
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            nav { padding: 0 20px; }
            .page { padding: 88px 20px 60px; }
            h1 { font-size: 32px; margin-bottom: 36px; }
            .seat { width: 38px; height: 38px; font-size: 10px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">Cine<span>plex</span></a>
    <div class="nav-links">
        <a href="/movies/">Films</a>
        <a href="/my-reservations/">Tickets</a>
    </div>
</nav>

<div class="page">

    <div class="overline"><span class="overline-rule"></span> Pick your spot</div>
    <h1>Select <em>your seats.</em></h1>

    <div class="screen">Screen</div>

    <div class="seat-grid">
        {% for row in "ABCDE" %}
        <div class="seat-row">
            <span class="row-label">{{ row }}</span>
            <div class="seats">
                {% for num in "12345" %}
                    {% with seat=row|add:num %}
                        {% if seat in booked_seats %}
                            <div class="seat seat-booked">{{ seat }}</div>
                        {% else %}
                            <form method="POST" action="/book-seat/" style="display:inline;">
                                {% csrf_token %}
                                <input type="hidden" name="showtime_id" value="{{ showtime_id }}">
                                <input type="hidden" name="seat" value="{{ seat }}">
                                <button type="submit" class="seat seat-available">{{ seat }}</button>
                            </form>
                        {% endif %}
                    {% endwith %}
                {% endfor %}
            </div>
        </div>
        {% endfor %}
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-swatch swatch-available"></div>
            Available
        </div>
        <div class="legend-item">
            <div class="legend-swatch swatch-booked"></div>
            Taken
        </div>
    </div>

</div>

</body>
</html>
